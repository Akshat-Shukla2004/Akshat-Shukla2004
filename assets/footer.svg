<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="180" viewBox="0 0 1400 180">
<defs>
  <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#8B5CF6"/>
    <stop offset="50%" stop-color="#C770F0"/>
    <stop offset="100%" stop-color="#22D3EE"/>
  </linearGradient>

  <filter id="glow">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge>
      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<rect width="1400" height="180" fill="#0D1117"/>

<line x1="120" y1="50" x2="1280" y2="50"
stroke="url(#g)" stroke-width="2" filter="url(#glow)"/>

<text x="700"
y="95"
text-anchor="middle"
font-family="Segoe UI,Arial"
font-size="28"
font-weight="700"
fill="#F8FAFC">
⚡ ALWAYS BUILDING
</text>

<text x="700"
y="128"
text-anchor="middle"
font-family="Segoe UI,Arial"
font-size="18"
fill="#94A3B8">
Building scalable backend systems that survive production.
</text>

<circle cx="700" cy="155" r="4" fill="#22D3EE">
<animate attributeName="r"
values="3;7;3"
dur="2s"
repeatCount="indefinite"/>
</circle>

<rect x="-220" y="0" width="180" height="180"
fill="#ffffff"
opacity="0.05">
<animate attributeName="x"
values="-220;1600"
dur="7s"
repeatCount="indefinite"/>
</rect>

</svg>
