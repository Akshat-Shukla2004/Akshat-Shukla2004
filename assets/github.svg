<svg xmlns="http://www.w3.org/2000/svg" width="900" height="110" viewBox="0 0 900 110">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#8B5CF6"/>
<stop offset="50%" stop-color="#C770F0"/>
<stop offset="100%" stop-color="#22D3EE"/>
</linearGradient>
<filter id="glow">
<feGaussianBlur stdDeviation="4" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>

<rect width="900" height="110" rx="16" fill="#161B22" stroke="url(#g)" stroke-width="2"/>

<g opacity="0.25" stroke="#C770F0">
<path d="M40 55 H120 V25 H180"/>
<path d="M860 55 H780 V85 H720"/>
<circle cx="120" cy="55" r="3" fill="#22D3EE"/>
<circle cx="780" cy="55" r="3" fill="#22D3EE"/>
</g>

<text x="450" y="68"
font-family="Segoe UI,Arial"
font-size="34"
font-weight="700"
text-anchor="middle"
fill="url(#g)"
filter="url(#glow)">
GITHUB ANALYTICS
</text>

<rect x="-220" y="0" width="160" height="110" fill="#ffffff" opacity="0.05">
<animate attributeName="x" values="-220;980" dur="6s" repeatCount="indefinite"/>
</rect>

</svg>