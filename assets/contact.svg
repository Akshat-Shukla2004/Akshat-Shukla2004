<svg xmlns="http://www.w3.org/2000/svg" width="900" height="110" viewBox="0 0 900 110">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#8B5CF6"/>
<stop offset="50%" stop-color="#C770F0"/>
<stop offset="100%" stop-color="#22D3EE"/>
</linearGradient>
<filter id="glow">
<feGaussianBlur stdDeviation="4" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>

<rect width="900" height="110" rx="16" fill="#161B22" stroke="url(#g)" stroke-width="2"/>

<g opacity="0.22" stroke="#22D3EE" stroke-width="2" fill="none">
<path d="M45 55 H180 V25 H270"/>
<path d="M855 55 H720 V85 H630"/>
<circle cx="180" cy="55" r="3" fill="#C770F0"/>
<circle cx="720" cy="55" r="3" fill="#C770F0"/>
</g>

<text x="450" y="67"
font-family="Segoe UI,Arial"
font-size="34"
font-weight="700"
text-anchor="middle"
fill="url(#g)"
filter="url(#glow)">
CONNECT
</text>

<g transform="translate(450,30)">
<circle r="4" fill="#22D3EE">
<animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite"/>
</circle>
</g>

<rect x="-180" y="0" width="140" height="110" fill="#fff" opacity="0.05">
<animate attributeName="x" values="-180;980" dur="6s" repeatCount="indefinite"/>
</rect>
</svg>