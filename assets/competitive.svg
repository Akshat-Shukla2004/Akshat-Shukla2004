<svg xmlns="http://www.w3.org/2000/svg" width="900" height="110" viewBox="0 0 900 110">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#8B5CF6"/>
<stop offset="50%" stop-color="#C770F0"/>
<stop offset="100%" stop-color="#22D3EE"/>
</linearGradient>

<filter id="glow">
<feGaussianBlur stdDeviation="4" result="b"/>
<feMerge>
<feMergeNode in="b"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>
</defs>

<rect width="900" height="110" rx="16" fill="#161B22" stroke="url(#g)" stroke-width="2"/>

<g opacity="0.22" stroke="#C770F0" stroke-width="2">
<path d="M40 55 H170 V25 H260"/>
<path d="M860 55 H730 V85 H640"/>
<circle cx="170" cy="55" r="3" fill="#22D3EE"/>
<circle cx="730" cy="55" r="3" fill="#22D3EE"/>
</g>

<text x="450" y="66"
font-family="Segoe UI,Arial"
font-size="32"
font-weight="700"
fill="url(#g)"
text-anchor="middle"
filter="url(#glow)">
COMPETITIVE PROGRAMMING
</text>

<circle cx="450" cy="90" r="3" fill="#22D3EE">
<animate attributeName="r" values="2;5;2" dur="2s" repeatCount="indefinite"/>
</circle>

<rect x="-180" y="0" width="140" height="110" fill="#ffffff" opacity="0.05">
<animate attributeName="x" values="-180;980" dur="7s" repeatCount="indefinite"/>
</rect>

</svg>