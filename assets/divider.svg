<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="90" viewBox="0 0 1400 90">
<defs>
  <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#8B5CF6"/>
    <stop offset="50%" stop-color="#C770F0"/>
    <stop offset="100%" stop-color="#22D3EE"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge>
      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<rect width="1400" height="90" fill="transparent"/>

<line x1="60" y1="45" x2="560" y2="45" stroke="url(#g)" stroke-width="2" filter="url(#glow)"/>
<line x1="840" y1="45" x2="1340" y2="45" stroke="url(#g)" stroke-width="2" filter="url(#glow)"/>

<polygon points="700,18 726,33 726,57 700,72 674,57 674,33"
fill="none" stroke="url(#g)" stroke-width="2" filter="url(#glow)">
<animateTransform attributeName="transform"
attributeType="XML"
type="rotate"
from="0 700 45"
to="360 700 45"
dur="12s"
repeatCount="indefinite"/>
</polygon>

<circle cx="700" cy="45" r="5" fill="#22D3EE">
<animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite"/>
</circle>

<circle cx="560" cy="45" r="3" fill="#C770F0"/>
<circle cx="840" cy="45" r="3" fill="#C770F0"/>

</svg>
