<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0D1117"/>
    <stop offset="100%" stop-color="#161B22"/>
  </linearGradient>

  <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#8B5CF6"/>
    <stop offset="50%" stop-color="#C770F0"/>
    <stop offset="100%" stop-color="#22D3EE"/>
  </linearGradient>

  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="5" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <pattern id="hex" width="70" height="60" patternUnits="userSpaceOnUse">
    <path d="M17.5,0 L52.5,0 L70,30 L52.5,60 L17.5,60 L0,30 Z"
          fill="none" stroke="#30363D" stroke-width="1"/>
  </pattern>
</defs>

<rect width="1600" height="500" fill="url(#bg)"/>
<rect width="1600" height="500" fill="url(#hex)" opacity="0.35"/>

<g stroke="#C770F0" stroke-width="2" opacity="0.35">
<path d="M120 90 H420 V170 H650"/>
<path d="M1480 410 H1180 V300 H930"/>
<circle cx="420" cy="90" r="5" fill="#C770F0"/>
<circle cx="1180" cy="410" r="5" fill="#22D3EE"/>
<circle cx="650" cy="170" r="5" fill="#22D3EE"/>
<circle cx="930" cy="300" r="5" fill="#C770F0"/>
</g>

<rect x="40" y="40" width="1520" height="420" rx="22"
fill="none" stroke="url(#neon)" stroke-width="3" filter="url(#glow)"/>

<text x="800" y="170" text-anchor="middle"
font-family="Segoe UI,Arial" font-size="62"
font-weight="700" fill="#F8FAFC">
AKSHAT SHUKLA
</text>

<text x="800" y="220" text-anchor="middle"
font-family="Segoe UI,Arial" font-size="24"
fill="#C770F0">
Backend Engineer • Competitive Programmer
</text>

<text x="800" y="258" text-anchor="middle"
font-family="Segoe UI,Arial" font-size="22"
fill="#94A3B8">
Distributed Systems • AI Infrastructure
</text>

<text x="800" y="315" text-anchor="middle"
font-family="Consolas,monospace" font-size="21"
fill="#22D3EE">
FastAPI • Kafka • Redis • PostgreSQL • Kubernetes
</text>

<line x1="220" y1="355" x2="1380" y2="355" stroke="url(#neon)" stroke-width="2" opacity="0.8"/>

<g fill="#22D3EE" opacity="0.65">
<circle cx="300" cy="390" r="2"><animate attributeName="cx" values="300;1300;300" dur="8s" repeatCount="indefinite"/></circle>
<circle cx="1250" cy="120" r="2"><animate attributeName="cy" values="120;380;120" dur="6s" repeatCount="indefinite"/></circle>
<circle cx="650" cy="420" r="2"><animate attributeName="cx" values="650;950;650" dur="5s" repeatCount="indefinite"/></circle>
</g>

<rect x="-250" y="40" width="220" height="420" fill="#FFFFFF" opacity="0.05">
<animate attributeName="x" values="-250;1650" dur="7s" repeatCount="indefinite"/>
</rect>

</svg>