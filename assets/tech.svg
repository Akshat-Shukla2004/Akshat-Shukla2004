<svg xmlns="http://www.w3.org/2000/svg" width="900" height="110" viewBox="0 0 900 110">
<defs>
<linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#8B5CF6"/>
<stop offset="50%" stop-color="#C770F0"/>
<stop offset="100%" stop-color="#22D3EE"/>
</linearGradient>
<filter id="glow">
<feGaussianBlur stdDeviation="4" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>

<rect width="900" height="110" rx="16" fill="#161B22" stroke="url(#g)" stroke-width="2"/>

<g opacity="0.22" stroke="#22D3EE" stroke-width="2" fill="none">
<path d="M40 55 H140 V30 H230"/>
<path d="M860 55 H760 V80 H670"/>
<circle cx="140" cy="55" r="3" fill="#C770F0"/>
<circle cx="760" cy="55" r="3" fill="#C770F0"/>
</g>

<text x="450" y="67"
font-family="Segoe UI,Arial"
font-size="34"
font-weight="700"
fill="url(#g)"
text-anchor="middle"
filter="url(#glow)">
TECH ARSENAL
</text>

<g opacity="0.8">
<rect x="365" y="82" width="170" height="2" fill="url(#g)"/>
<circle cx="450" cy="83" r="3" fill="#22D3EE">
<animate attributeName="cx" values="365;535;365" dur="3s" repeatCount="indefinite"/>
</circle>
</g>

<rect x="-180" y="0" width="140" height="110" fill="#ffffff" opacity="0.05">
<animate attributeName="x" values="-180;980" dur="6.5s" repeatCount="indefinite"/>
</rect>

</svg>
