<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0b0b16"/>
    <stop offset="100%" stop-color="#140b24"/>
  </linearGradient>
  <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#8b5cf6"/>
    <stop offset="100%" stop-color="#d946ef"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge>
      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<rect width="1600" height="420" fill="url(#bg)"/>

<g opacity="0.15" stroke="#a855f7">
  <path d="M40 80H350V140H520V70H760" fill="none"/>
  <path d="M1240 330H980V250H830V310H610" fill="none"/>
  <circle cx="350" cy="80" r="4" fill="#c084fc"/>
  <circle cx="980" cy="330" r="4" fill="#c084fc"/>
</g>

<rect x="40" y="40" width="1520" height="340" rx="22"
      fill="none" stroke="url(#neon)" stroke-width="3"
      filter="url(#glow)"/>

<text x="800" y="145" text-anchor="middle"
      font-size="58" font-family="Segoe UI, Arial"
      font-weight="700" fill="#ffffff">
AKSHAT SHUKLA
</text>

<text x="800" y="195" text-anchor="middle"
      font-size="22" font-family="Segoe UI, Arial"
      fill="#c084fc">
Backend Engineer • Competitive Programmer
</text>

<text x="800" y="228" text-anchor="middle"
      font-size="22" font-family="Segoe UI, Arial"
      fill="#c084fc">
Distributed Systems • AI Infrastructure
</text>

<text x="800" y="286" text-anchor="middle"
      font-size="20" font-family="Consolas, monospace"
      fill="#7dd3fc">
FastAPI • Kafka • Redis • PostgreSQL • Kubernetes
</text>

<line x1="140" y1="330" x2="1460" y2="330"
      stroke="url(#neon)" stroke-width="2" opacity="0.8"/>

<rect x="-320" y="40" width="180" height="340" fill="#ffffff" opacity="0.06">
  <animate attributeName="x" values="-320;1720" dur="6s" repeatCount="indefinite"/>
</rect>
</svg>
